services:
  postgres:
    image: postgres:16-alpine
    container_name: moto-mini-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moto
      POSTGRES_PASSWORD: moto
      POSTGRES_DB: moto_mini_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moto -d moto_mini_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
